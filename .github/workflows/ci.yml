name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build:
    name: Build and Verify Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # MEDIUM-3 FIX: churn_model.joblib is gitignored and not present after checkout.
      # The Dockerfile contains "COPY models/ ./models/" — this would fail on a fresh
      # checkout without this step. Download the artefact from GHCR before building.
      # MODEL_ARTIFACT_URL must be set as a GitHub Actions repository secret pointing
      # to the versioned .joblib file (e.g. an S3 pre-signed URL or GHCR artefact URL).
      - name: Download model artefact
        run: |
          mkdir -p models
          curl -L -o models/churn_model.joblib "${{ secrets.MODEL_ARTIFACT_URL }}"

      - name: Build Docker image
        run: docker build -t ml-api:latest .

      - name: Verify container starts and responds
        run: |
          docker run -d -p 8000:8000 --name ml-api-test ml-api:latest
          sleep 8
          curl -f http://localhost:8000/health || (docker logs ml-api-test && exit 1)
          docker stop ml-api-test
          docker rm ml-api-test

