name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build:
    name: Build and Verify Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # CI FIX: generate a minimal synthetic artifact instead of downloading
      # the real model (which is gitignored and has no stored secret URL).
      # The synthetic model has identical artifact structure to the real one
      # (keys: model, feature_count, model_version) so the container starts
      # and serves predictions correctly — only the weights differ.
      - name: Generate synthetic model for CI build
        run: |
          pip install scikit-learn joblib numpy
          python scripts/generate_ci_model.py

      - name: Build Docker image
        run: docker build -t ml-api:latest .

      - name: Verify container starts and responds
        run: |
          docker run -d -p 8000:8000 --name ml-api-test ml-api:latest
          sleep 8
          curl -f http://localhost:8000/health || (docker logs ml-api-test && exit 1)
          docker stop ml-api-test
          docker rm ml-api-test

